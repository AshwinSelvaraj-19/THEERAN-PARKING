<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | NAT Parking Assistance</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease-out;
    }
    .fade-in.show {
      opacity: 1;
      transform: translateY(0);
    }
    .transition-section {
      transition: transform 0.7s ease-in-out, opacity 0.7s ease-in-out;
    }
    .hidden-section {
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
    }
    .visible-section {
      transform: translateX(0%);
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body class="bg-white min-h-screen flex font-sans overflow-hidden">

<!-- LEFT SECTION -->
<section class="w-1/2 bg-[#1A2E45] text-white flex flex-col justify-center items-center p-10 fixed left-0 top-0 bottom-0">
  <div class="bg-white text-[#1A2E45] p-10 rounded-2xl shadow-xl text-center max-w-sm">
    <img src="NAT logo bg removed.png" class="h-64 w-64 mx-auto"/>
    <h1 class="text-3xl font-bold">Welcome to</h1>
    <h2 class="text-2xl font-semibold text-green-600 mt-1">NAT Parking Community</h2>
    <p class="text-blue-400 mt-4">Smart parking system</p>
    <button id="toggleBtn" class="mt-6 px-6 py-2 border rounded">
      Learn More
    </button>
  </div>
</section>

<!-- RIGHT SECTION -->
<div class="ml-[50%] w-1/2 h-screen relative">

<!-- LOGIN -->
<div id="loginSection" class="absolute inset-0 px-10 py-16 flex items-center justify-center flex-col visible-section">
  <div class="w-full max-w-md">

    <h2 class="text-2xl font-bold mb-2">Login</h2>

    <form id="loginForm" class="space-y-4">

      <input id="username" type="text" placeholder="Username"
        class="w-full p-2 border rounded"/>

      <input id="password" type="password" placeholder="Password"
        class="w-full p-2 border rounded"/>

      <button class="w-full bg-[#1A2E45] text-white py-2 rounded">
        Login
      </button>

    </form>

  </div>
</div>

<!-- FEATURES -->
<div id="featuresSection" class="absolute inset-0 px-8 py-16 hidden-section">

  <h1 class="text-3xl font-bold mb-6">Features</h1>

  <div class="space-y-6">
    <div class="fade-in bg-gray-100 p-4 rounded">
      Real-time Vehicle Summary
    </div>
    <div class="fade-in bg-gray-100 p-4 rounded">
      Admin Dashboard
    </div>
    <div class="fade-in bg-gray-100 p-4 rounded">
      Smart Payments (Soon)
    </div>
  </div>

</div>
</div>

<!-- SCRIPT -->
<script>

// TOGGLE
const toggleBtn = document.getElementById("toggleBtn");
const loginSection = document.getElementById("loginSection");
const featuresSection = document.getElementById("featuresSection");

let show = false;

toggleBtn.onclick = () => {
  show = !show;

  if (show) {
    loginSection.classList.replace("visible-section", "hidden-section");
    featuresSection.classList.replace("hidden-section", "visible-section");
    toggleBtn.innerText = "Back";
  } else {
    featuresSection.classList.replace("visible-section", "hidden-section");
    loginSection.classList.replace("hidden-section", "visible-section");
    toggleBtn.innerText = "Learn More";
  }
};

// LOGIN LOGIC (MANUAL)
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (user === "tharan" && pass === "123") {
    localStorage.setItem("username", user);
    window.location.href = "Dashboard.html";
  } else {
    alert("Invalid credentials");
  }
});

</script>

</body>
</html>
